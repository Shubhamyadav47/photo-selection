<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Secure Gallery & Selection Generator</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --success-hover: #059669;
            --background: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
            background-color: #F9FAFB;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        textarea {
            height: 160px;
            resize: vertical;
            font-family: monospace;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-group input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-group span {
            font-size: 13px;
            color: var(--text-muted);
        }

        .buttons-wrapper {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-generate {
            background-color: var(--primary);
            color: white;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .btn-download {
            background-color: var(--success);
            color: white;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-download.active {
            opacity: 1;
            cursor: pointer;
        }

        .btn-download.active:hover {
            background-color: var(--success-hover);
        }

        /* Custom Notification Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #1F2937;
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            pointer-events: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>

<body>

    <div class="container">

            <h1>Secure Selection Gallery Generator</h1>
            <p>Generate private, responsive galleries with instant photo selection, WhatsApp sharing, & file list copying.</p>
        </div>

        <div class="form-row">

            </div>

            <label for="whatsappNumber">Photographer's WhatsApp Number (Optional)</label>
            <input type="text" id="whatsappNumber" placeholder="Include country code without '+' or '00' (e.g., 919876543210)">
        </div>

        <div class="form-group">
            <label for="imageList">Images List (Names or full local system paths)</label>

C:\User\Photos\IMG_0001.JPG

photo_landscape_04.png"></textarea>

                <input type="checkbox" id="cleanFilenames" checked>

            </label>
        </div>

    <script>
        let generatedHTML = "";

        function showNotification(text) {
            const toast = document.getElementById("toast");
            toast.innerText = text;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function generateGallery() {
            const rawTitle = document.getElementById("galleryTitle").value.trim() || "My Selection Gallery";
            const title = escapeHtml(rawTitle);
            const password = document.getElementById("galleryPassword").value.trim();
            const escapedPasswordJs = password.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            const rawInput = document.getElementById("imageList").value;
            const cleanFiles = document.getElementById("cleanFilenames").checked;
            const waNumber = document.getElementById("whatsappNumber").value.trim().replace(/[^0-9]/g, "");

            if (!rawInput.trim()) {
                showNotification("Please enter at least one image name.");
                return;
            }

            // Parse images
            const images = rawInput
                .replace(/\r/g, "")
                .split(/[\n,]+/)
                .map(name => {
                    name = name.trim();
                    if (cleanFiles) {
                        name = name.replace(/\\/g, "/");
                        if (name.includes("/")) {
                            name = name.substring(name.lastIndexOf("/") + 1);
                        }
                    }
                    // Remove accidental wrapping quotes from file names
                    name = name.replace(/^['"]+|['"]+$/g, "");
                    return name;
                })
                .filter(name => name.length > 0);

            if (images.length === 0) {
                showNotification("No valid image names could be extracted.");
                return;
            }

            // Create cards using clean attributes and secure layered CSS fallbacks
            const imageTags = images.map(name => {
                const escapedName = escapeHtml(name);
                const jsSafeName = escapedName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `
                <div class="photo-card" data-name="${jsSafeName}" onclick="toggleSelection(this)">
                    <div class="image-wrapper">
                        <div class="fallback-placeholder">${escapedName}</div>
                        <img src="${escapedName}" alt="${escapedName}" loading="lazy" onerror="this.style.display='none';">
                    </div>
                    <div class="photo-name">${escapedName}</div>
                </div>
                `;
            }).join("");

            /* PASSWORD MODULES */
            const loginHTML = password ? `
            <div id="loginScreen" class="login-screen">
                <div class="login-card">
                    <div class="lock-icon">🔒</div>
                    <h2>Private Gallery</h2>
                    <p>Enter the passcode to view and select your photos.</p>
                    <input type="password" id="passwordInput" placeholder="Password Access">
                    <button class="btn-primary" onclick="checkPassword()">Unlock Gallery</button>
                    <div id="loginError" class="login-error">Incorrect password. Please try again.</div>
                </div>
            </div>
            ` : "";

            const passwordScript = password ? `
            <script>
            const correctPassword = "${escapedPasswordJs}";
            function checkPassword() {
                const entered = document.getElementById("passwordInput").value;
                const errorDiv = document.getElementById("loginError");
                if (entered === correctPassword) {
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("galleryContent").style.display = "block";
                } else {
                    errorDiv.style.opacity = "1";
                    setTimeout(() => { errorDiv.style.opacity = "0"; }, 3000);
                }
            }
            // Bind Enter Key
            document.getElementById("passwordInput")?.addEventListener("keyup", function(event) {
                if (event.key === "Enter") {
                    checkPassword();
                }
            });
            <\/script>
            ` : "";

            // Full Dynamic Output Code Template
            generatedHTML = `<!DOCTYPE html>

<script>
    let selectedPhotos = new Set();
    const myWhatsAppNumber = "${waNumber}";

    function toggleSelection(element) {
        const photoName = element.getAttribute('data-name');
        if (selectedPhotos.has(photoName)) {
            selectedPhotos.delete(photoName);
            element.classList.remove('selected');
        } else {
            selectedPhotos.add(photoName);
            element.classList.add('selected');
        }
        document.getElementById('count').innerText = selectedPhotos.size + " Photos Selected";
    }

    function showToast(text) {
        const toast = document.getElementById("toast");
        toast.innerText = text;
        toast.classList.add("show");
        setTimeout(() => { toast.classList.remove("show"); }, 2500);
    }

    function getFormattedText() {
        if(selectedPhotos.size === 0) return "";
        let text = "Hello, I have selected these photos for editing:\\n\\n";
        text += Array.from(selectedPhotos).join("\\n");
        return text;
    }

    function copyListToClipboard() {
        if (selectedPhotos.size === 0) {
            showToast("Please select at least one photo first!");
            return;
        }
        
        const textToCopy = getFormattedText();
        const tempTextarea = document.createElement("textarea");
        tempTextarea.value = textToCopy;
        document.body.appendChild(tempTextarea);
        tempTextarea.select();
        
        try {
            document.execCommand('copy');
            showToast("Selection list copied to clipboard!");
        } catch (err) {
            showToast("Failed to copy list.");
        }
        
        document.body.removeChild(tempTextarea);
    }

    function sendToWhatsApp() {
        if(selectedPhotos.size === 0) {
            showToast("Please select at least one photo first!");
            return;
        }
        
        const message = encodeURIComponent(getFormattedText());
        const whatsappUrl = "https://wa.me/" + myWhatsAppNumber + "?text=" + message;
        window.open(whatsappUrl, '_blank');
    }
<\/script>

        function downloadFile() {
            if (!generatedHTML) {
                showNotification("Please generate your gallery first.");
                return;
            }
            const blob = new Blob([generatedHTML], { type: "text/html" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "interactive-selection-gallery.html";
            link.click();
            showNotification("Your gallery was successfully saved.");
        }
