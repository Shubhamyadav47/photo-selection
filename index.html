<!-- ========================================================= -->

<!-- ========================================================= -->
<!DOCTYPE html>  
<html lang="en">  

<head>  
    <!-- Character encoding -->
    <meta charset="UTF-8">  

    <!-- Mobile responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  

    <!-- Browser tab title -->
    <title>Premium Secure Gallery & Selection Generator</title>  

    <style>  

        /* =========================================================
           ROOT VARIABLES (GLOBAL COLOR SYSTEM)
        ========================================================== */
        :root {  
            --primary: #4F46E5;  
            --primary-hover: #4338CA;  
            --success: #10B981;  
            --success-hover: #059669;  
            --background: #F3F4F6;  
            --card-bg: #FFFFFF;  
            --text-main: #1F2937;  
            --text-muted: #6B7280;  
            --border: #E5E7EB;  
        }  

        /* =========================================================
           GLOBAL RESET
        ========================================================== */
        * {  
            box-sizing: border-box;  
            margin: 0;  
            padding: 0;  
        }  

        /* =========================================================
           BODY STYLING
        ========================================================== */
        body {  
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
            background-color: var(--background);  
            color: var(--text-main);  
            line-height: 1.5;  
            padding: 40px 20px;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            min-height: 100vh;  
        }  

        /* =========================================================
           MAIN CONTAINER
        ========================================================== */
        .container {  
            background: var(--card-bg);  
            max-width: 800px;  
            width: 100%;  
            padding: 40px;  
            border-radius: 16px;  
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);  
            border: 1px solid var(--border);  
        }  

        /* =========================================================
           HEADER SECTION
        ========================================================== */
        .header {  
            text-align: center;  
            margin-bottom: 30px;  
        }  

        .header h1 {  
            font-size: 28px;  
            font-weight: 800;  
            color: #111827;  
            letter-spacing: -0.025em;  
            margin-bottom: 8px;  
        }  

        .header p {  
            color: var(--text-muted);  
            font-size: 15px;  
        }  

        /* =========================================================
           FORM ELEMENTS
        ========================================================== */
        .form-group {  
            margin-bottom: 20px;  
        }  

        /* Two-column layout */
        .form-row {  
            display: grid;  
            grid-template-columns: 1fr 1fr;  
            gap: 16px;  
        }  

        /* Mobile responsive layout */
        @media (max-width: 640px) {  
            .form-row {  
                grid-template-columns: 1fr;  
                gap: 0;  
            }  
        }  

        /* Labels */
        label {  
            display: block;  
            font-size: 14px;  
            font-weight: 600;  
            color: #374151;  
            margin-bottom: 6px;  
        }  

        /* Text inputs + password + textarea */
        input[type="text"],  
        input[type="password"],  
        textarea {  
            width: 100%;  
            padding: 12px 16px;  
            border-radius: 8px;  
            border: 1px solid var(--border);  
            font-size: 14px;  
            background-color: #F9FAFB;  
            transition: all 0.2s ease;  
            color: var(--text-main);  
        }  

        /* Input focus effect */
        input:focus,  
        textarea:focus {  
            outline: none;  
            border-color: var(--primary);  
            background-color: #FFFFFF;  
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);  
        }  

        /* Textarea styling */
        textarea {  
            height: 160px;  
            resize: vertical;  
            font-family: monospace;  
        }  

        /* =========================================================
           CHECKBOX SECTION
        ========================================================== */
        .checkbox-group {  
            display: flex;  
            align-items: center;  
            gap: 8px;  
            margin-top: 8px;  
            cursor: pointer;  
            user-select: none;  
        }  

        .checkbox-group input {  
            width: 16px;  
            height: 16px;  
            cursor: pointer;  
        }  

        .checkbox-group span {  
            font-size: 13px;  
            color: var(--text-muted);  
        }  

        /* =========================================================
           BUTTONS SECTION
        ========================================================== */
        .buttons-wrapper {  
            display: flex;  
            gap: 12px;  
            margin-top: 30px;  
        }  

        button {  
            flex: 1;  
            display: inline-flex;  
            justify-content: center;  
            align-items: center;  
            gap: 8px;  
            padding: 14px;  
            border: none;  
            border-radius: 8px;  
            cursor: pointer;  
            font-size: 15px;  
            font-weight: 600;  
            transition: all 0.2s ease;  
        }  

        /* Generate button */
        .btn-generate {  
            background-color: var(--primary);  
            color: white;  
        }  

        .btn-generate:hover {  
            background-color: var(--primary-hover);  
        }  

        /* Download button */
        .btn-download {  
            background-color: var(--success);  
            color: white;  
            opacity: 0.6;  
            cursor: not-allowed;  
        }  

        .btn-download.active {  
            opacity: 1;  
            cursor: pointer;  
        }  

        .btn-download.active:hover {  
            background-color: var(--success-hover);  
        }  

        /* =========================================================
           TOAST NOTIFICATION
        ========================================================== */
        #toast {  
            position: fixed;  
            bottom: 30px;  
            left: 50%;  
            transform: translateX(-50%) translateY(100px);  
            background-color: #1F2937;  
            color: #FFFFFF;  
            padding: 12px 24px;  
            border-radius: 50px;  
            font-size: 14px;  
            font-weight: 500;  
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);  
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
            z-index: 1000;  
            pointer-events: none;  
        }  

        /* Toast visible state */
        #toast.show {  
            transform: translateX(-50%) translateY(0);  
        }  
    </style>  
</head>

        </div>  
    </div>

        function showNotification(text) {  

            const toast = document.getElementById("toast");  

            toast.innerText = text;  
            toast.classList.add("show");  

            setTimeout(() => {  
                toast.classList.remove("show");  
            }, 3000);  
        }

           HTML ESCAPE FUNCTION

        function escapeHtml(str) {  
            return str

                .replace(/>/g, "&gt;")  
                .replace(/"/g, "&quot;")  
                .replace(/'/g, "&#039;");  
        }
